<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>它能做什么</title>
  <link rel="stylesheet" href="notion-card.css">
</head>
<body data-ready="1">
  <main class="canvas">
    <aside class="sidebar">
      <div class="workspace-mark">S</div>
      <div class="side-lines" aria-hidden="true"><span class="side-line"></span><span class="side-line"></span><span class="side-line active"></span><span class="side-line"></span></div>
      <div class="side-index">SHUSHU / 02</div>
    </aside>

    <article class="page">
      <header class="topbar">
        <div class="crumb"><span class="crumb-dot"></span>树树工具箱 / Capabilities</div>
        <div class="top-actions">02 / 05</div>
      </header>

      <section class="hero">
        <div class="page-icon">🛠️</div>
        <div class="eyebrow">Six tools, one route</div>
        <h1>它能做什么？</h1>
        <p class="lead">从“找到材料”，一直走到“真正能复习”。</p>
      </section>

      <section class="section">
        <div class="section-label">Tool database</div>
        <div class="database">
          <div class="db-row head"><div class="db-cell">#</div><div class="db-cell">能力</div><div class="db-cell">交付</div></div>
          <div class="db-row"><div class="db-cell db-num">01</div><div class="db-cell db-main">下载视频 / 音频</div><div class="db-cell db-note"><span class="tag gray">素材</span></div></div>
          <div class="db-row"><div class="db-cell db-num">02</div><div class="db-cell db-main">来源字幕 / 本地转写</div><div class="db-cell db-note"><span class="tag yellow">SRT</span></div></div>
          <div class="db-row"><div class="db-cell db-num">03</div><div class="db-cell db-main">分块翻译 + 时间轴校验</div><div class="db-cell db-note"><span class="tag green">双语字幕</span></div></div>
          <div class="db-row"><div class="db-cell db-num">04</div><div class="db-cell db-main">双语学习笔记</div><div class="db-cell db-note"><span class="tag blue">Markdown</span></div></div>
          <div class="db-row"><div class="db-cell db-num">05</div><div class="db-cell db-main">软字幕 / 硬字幕</div><div class="db-cell db-note"><span class="tag gray">视频</span></div></div>
          <div class="db-row"><div class="db-cell db-num">06</div><div class="db-cell db-main">网页 / PDF 精读</div><div class="db-cell db-note"><span class="tag blue">摘要</span></div></div>
        </div>
      </section>

      <section class="section compact">
        <div class="callout yellow" data-icon="✦">缺字幕时会先确认，再启动本地转写；关键步骤不会悄悄替你做决定。</div>
      </section>

      <footer class="footer">
        <span class="footer-brand">SHUSHU STUDY TOOLBOX</span>
        <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      </footer>
    </article>
  </main>
</body>
</html>
