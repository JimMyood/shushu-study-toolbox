<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>它是什么</title>
  <link rel="stylesheet" href="notion-card.css">
</head>
<body data-ready="1">
  <main class="canvas">
    <aside class="sidebar">
      <div class="workspace-mark">S</div>
      <div class="side-lines" aria-hidden="true"><span class="side-line"></span><span class="side-line active"></span><span class="side-line"></span><span class="side-line"></span></div>
      <div class="side-index">SHUSHU / 01</div>
    </aside>

    <article class="page">
      <header class="topbar">
        <div class="crumb"><span class="crumb-dot"></span>树树工具箱 / Overview</div>
        <div class="top-actions">01 / 05</div>
      </header>

      <section class="hero">
        <div class="page-icon">🧩</div>
        <div class="eyebrow">What it is</div>
        <h1>它是什么？</h1>
        <p class="lead">给 AI agent 用的<span class="highlight">本地学习工作流</span>。</p>
      </section>

      <section class="section">
        <div class="callout blue" data-icon="→">把散落在五六个工具里的步骤，收进一条可复跑、可校验的流水线。</div>
      </section>

      <section class="section grid-2">
        <div class="compare no">
          <div class="compare-title">✕ 它不是</div>
          <ul>
            <li>新播放器</li>
            <li>在线转写站</li>
            <li>另一个聊天框</li>
          </ul>
        </div>
        <div class="compare yes">
          <div class="compare-title">✓ 它是</div>
          <ul>
            <li>本地脚本</li>
            <li>清晰路由</li>
            <li>可复用流程</li>
          </ul>
        </div>
      </section>

      <section class="section">
        <div class="section-label">Workflow</div>
        <div class="flow">
          <div class="flow-node"><div class="flow-kicker">INPUT</div><div class="flow-title">视频 / 字幕<br>网页 / PDF</div></div>
          <div class="flow-arrow">→</div>
          <div class="flow-node"><div class="flow-kicker">PROCESS</div><div class="flow-title">脚本 +<br>AI agent</div></div>
          <div class="flow-arrow">→</div>
          <div class="flow-node"><div class="flow-kicker">OUTPUT</div><div class="flow-title">双语<br>学习材料</div></div>
        </div>
      </section>

      <footer class="footer">
        <span class="footer-brand">SHUSHU STUDY TOOLBOX</span>
        <div class="dots"><span class="dot"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      </footer>
    </article>
  </main>
</body>
</html>
