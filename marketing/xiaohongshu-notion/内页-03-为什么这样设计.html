<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>为什么这样设计</title>
  <link rel="stylesheet" href="notion-card.css">
</head>
<body data-ready="1">
  <main class="canvas">
    <aside class="sidebar">
      <div class="workspace-mark">S</div>
      <div class="side-lines" aria-hidden="true"><span class="side-line"></span><span class="side-line"></span><span class="side-line"></span><span class="side-line active"></span></div>
      <div class="side-index">SHUSHU / 03</div>
    </aside>

    <article class="page">
      <header class="topbar">
        <div class="crumb"><span class="crumb-dot"></span>树树工具箱 / Design</div>
        <div class="top-actions">03 / 05</div>
      </header>

      <section class="hero">
        <div class="page-icon">⚙️</div>
        <div class="eyebrow">Design principle</div>
        <h1>为什么这样设计？</h1>
        <p class="lead">让<span class="highlight">确定的事稳定</span>，让需要理解的事聪明。</p>
      </section>

      <section class="section">
        <div class="split-task">
          <div class="task-col">
            <div class="task-label">⌘ 脚本负责</div>
            <ul>
              <li>下载与切块</li>
              <li>时间轴校验</li>
              <li>字幕封装</li>
              <li>失败可重跑</li>
            </ul>
          </div>
          <div class="task-col">
            <div class="task-label">✦ AI 负责</div>
            <ul>
              <li>翻译语境</li>
              <li>解释概念</li>
              <li>整理重点</li>
              <li>生成笔记</li>
            </ul>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="callout yellow" data-icon="💡">真正省时间的，不是再开一个更强的模型，而是把每一步固定成可复跑、可校验的流程。</div>
      </section>

      <section class="section compact">
        <div class="properties">
          <div class="property-row"><div class="property-name">Mechanical</div><div class="property-value"><span class="tag gray">确定性工具</span></div></div>
          <div class="property-row"><div class="property-name">Language</div><div class="property-value"><span class="tag blue">上下文理解</span></div></div>
          <div class="property-row"><div class="property-name">Result</div><div class="property-value"><span class="tag green">更稳，也更容易检查</span></div></div>
        </div>
      </section>

      <footer class="footer">
        <span class="footer-brand">SHUSHU STUDY TOOLBOX</span>
        <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span></div>
      </footer>
    </article>
  </main>
</body>
</html>
