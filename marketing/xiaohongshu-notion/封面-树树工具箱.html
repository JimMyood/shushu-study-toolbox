<!doctype html>
<html lang="zh-CN">
<head>

    <aside class="sidebar">

      </section>

      <footer class="footer">

        <div class="dots"><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
